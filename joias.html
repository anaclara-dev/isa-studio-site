<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Joias</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- MENU -->

<nav>

  <h1>Belle Piercer</h1>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="perfuracoes.html">Perfurações</a></li>
    <li><a href="joias.html">Joias</a></li>
    <li><a href="agendamento.html">Agendamento</a></li>
  </ul>

</nav>

<!-- JOIAS -->

<section id="joias">

  <h2>Joias</h2>

  <!-- PERFURAÇÃO ESCOLHIDA -->

  <div id="perfuracaoEscolhida"></div>

  <!-- CATÁLOGO -->

  <div class="catalogo" id="catalogo"></div>

</section>


<div class="carrinho" onclick="finalizar()">
  🛒 <span id="contador">0</span>
</div>

<div id="toast">Adicionado</div>

<script>

/* =========================
   PERFURAÇÃO ESCOLHIDA
========================= */

const perfuracao =
JSON.parse(localStorage.getItem("perfuracao"));





/* =========================
   CARRINHO
========================= */

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || [];

document.getElementById("contador").innerText =
carrinho.length;

/* =========================
   ADICIONAR JOIA
========================= */

function escolherJoia(nomeJoia, valorJoia){

  // Criamos o texto do item. Se tiver perfuração mostra o nome, se não tiver, diz que é apenas a joia.
  let textoPerfuracao = "Apenas compra da joia (sem aplicação)";
  let valorPerfuracao = 0;

  // Se o cliente escolheu uma perfuração antes, pegamos os dados dela
  if (typeof perfuracao !== 'undefined' && perfuracao) {
    textoPerfuracao = perfuracao.nome;
    valorPerfuracao = perfuracao.valor;
  }

  // O total agora soma corretamente (valor da joia + valor da perfuração se houver)
  const total = valorPerfuracao + valorJoia;

  const item = `
Perfuração:
${textoPerfuracao}

Joia:
${nomeJoia}

Valor Total:
R$ ${total},00
`;

  carrinho.push(item);

  localStorage.setItem(
    "carrinho",
    JSON.stringify(carrinho)
  );

  document.getElementById("contador").innerText =
    carrinho.length;

  mostrarToast("Joia adicionada 🖤");
}

/* =========================
   FINALIZAR
========================= */

function finalizar(){

  if(carrinho.length === 0){

    mostrarToast("Carrinho vazio 🖤");

    return;
  }

  let texto =
    "Olá! Gostaria de:\n\n";

  carrinho.forEach((item) => {

    texto += item + "\n";
  });

  window.open(

    "https://wa.me/5561994240391?text=" +
    encodeURIComponent(texto),

    "_blank"
  );
}

/* =========================
   TOAST
========================= */

function mostrarToast(texto){

  const toast =
    document.getElementById("toast");

  toast.innerText = texto;

  toast.classList.add("show");

  setTimeout(() => {

    toast.classList.remove("show");

  }, 1500);
}

/* =========================
   CARREGAR JOIAS
========================= */

async function carregarJoias(){

  const resposta =
    await fetch("https://isa-studio-backend.onrender.com/catalogo");

  const produtos =
    await resposta.json();

  const catalogo =
    document.getElementById("catalogo");

  catalogo.innerHTML = "";

  produtos.forEach((produto) => {

    if(produto.categoria === "joia"){

      catalogo.innerHTML += `

      <div class="item">

        <img
src="https://isa-studio-backend.onrender.com/uploads/${produto.imagem}"
>

        <h3>${produto.nome}</h3>

        <div class="preco">
          R$ ${produto.preco}
        </div>

        <button onclick="escolherJoia('${produto.nome}', ${produto.preco})">

          Adicionar ao carrinho

        </button>

      </div>

      `;
    }

  });

}

carregarJoias();

</script>

</body>
</html>
