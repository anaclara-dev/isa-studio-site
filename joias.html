<link rel="stylesheet" href="style.css">

<section id="joias">
<h2>Joias</h2>
<div class="catalogo" id="catalogo"></div>

</section>
<script>

function escolherJoia(nomeJoia, valorJoia){

  const perfuracao =
    JSON.parse(localStorage.getItem("perfuracao"));

  if(!perfuracao){
    alert("Escolha uma perfuração primeiro");
    window.location.href = "perfuracoes.html";
    return;
  }

  const total =
    perfuracao.valor + valorJoia;

  const texto = `
Olá! 🖤

Gostaria de realizar:

• Perfuração: ${perfuracao.nome}
• Joia: ${nomeJoia}

Valor total: R$ ${total},00
`;

  const url =
`https://wa.me/5561994240391?text=${encodeURIComponent(texto)}`;

  window.open(url, "_blank");
}

async function carregarJoias(){

  const resposta =
    await fetch("http://localhost:3000/catalogo");

  const produtos =
    await resposta.json();

  const catalogo =
    document.getElementById("catalogo");

  catalogo.innerHTML = "";

  produtos.forEach((produto) => {

    if(produto.categoria === "joia"){

      catalogo.innerHTML += `

      <div class="item">

        <img
          src="http://localhost:3000/uploads/${produto.imagem}"
        >

        <h3>${produto.nome}</h3>

        <div class="preco">
          R$ ${produto.preco}
        </div>

        <button onclick="escolherJoia('${produto.nome}', ${produto.preco})">
          Escolher joia
        </button>

      </div>

      `;
    }

  });

}

carregarJoias();


</script>
