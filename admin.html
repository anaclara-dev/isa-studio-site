<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Painel Admin</title>

  <link rel="stylesheet" href="style.css">

</head>

<body class="fundo-agendamento">

<nav>
  <h1>Belle Piercer Admin</h1>
</nav>

<section class="centro">

  <div class="agendamento">

    <p class="frase">
      Painel de Joias
    </p>

    <form id="formulario">

      <input
        type="text"
        id="nome"
        placeholder="Nome da joia"
        required
      >

      <input
        type="number"
        id="preco"
        placeholder="Preço"
        required
      >

      <select id="categoria">

        <option value="joia">
          Joia
        </option>

      </select>

      <input
        type="file"
        id="imagem"
        required
      >

      <img
        id="preview"
        style="
          width:100%;
          border-radius:12px;
          display:none;
          margin-bottom:15px;
        "
      >

      <button type="submit">
        Salvar Joia
      </button>

    </form>
 
  </div>
<div id="listaJoias"></div>
</section>

<script src="admin.js"></script>

<script>

const imagemInput =
document.getElementById("imagem");

const preview =
document.getElementById("preview");

imagemInput.addEventListener(

  "change",

  () => {

    const arquivo =
      imagemInput.files[0];

    if(arquivo){

      preview.src =
        URL.createObjectURL(arquivo);

      preview.style.display = "block";
    }
  }
);

</script>

</body>
</html>
